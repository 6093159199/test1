<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fumiko Poko - Official ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind = { theme: { extend: { fontFamily: { thai: ['Mitr', 'sans-serif'] } } } }
    </script>
    <style>
        :root {
            --bg: #0B0B2A;
            --main: #BB86FC;
            --dark: #C084FC;
            --white: #FFFFFF;
            --glow: rgba(187, 134, 252, 0.5);
            --accent: #FF71CF;
            --card-bg: rgba(25, 25, 70, 0.45);
            --text-main: #FFFFFF;
            --text-soft: #E0E0E0;
            --text-light: #B0B0B0;
            --status-from: #B8E8B0;
            --status-to: #78CC72;
            --do-bg: #F0FAF0;
            --do-border: #B8E6B0;
            --dont-bg: #FFF2F2;
            --dont-border: #FFBCBC;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Mitr', sans-serif;
        }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            color: #fff;
            overflow-x: hidden;
            position: relative;
        }

        .bg-emojis {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .floating-emoji {
            position: absolute;
            font-size: 22px;
            opacity: 0.5;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.2));
            animation: float-bg 18s infinite linear;
        }

        @keyframes float-bg {
            0% { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }

        .container {
            max-width: 500px;
            width: 100%;
            padding: 20px 15px 60px;
            position: relative;
            z-index: 1;
        }

        .header-box {
            text-align: center;
            padding: 40px 15px 30px;
        }

        h1 {
            color: var(--white);
            text-shadow: 2px 2px 8px rgba(187, 134, 252, 0.5);
            font-size: 32px;
            margin-bottom: 10px;
        }

        .logo-wrapper {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-glow {
            position: absolute;
            width: 115%;
            height: 115%;
            background: var(--main);
            border-radius: 50%;
            filter: blur(35px);
            opacity: 0.4;
            animation: pulse-glow 4s infinite alternate;
        }

        .logo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            z-index: 5;
            border: 3px solid var(--white);
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes pulse-glow {
            from { transform: scale(0.95); opacity: 0.3; }
            to { transform: scale(1.05); opacity: 0.5; }
        }

        .section {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 40px;
            border: 2px solid var(--main);
            box-shadow: 0 0 15px var(--glow);
            animation: slideUp 0.55s ease both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            color: var(--dark);
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        h2::after {
            content: '';
            flex: 1;
            height: 2px;
            background: linear-gradient(to right, var(--main), transparent);
        }

        .badge-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 15px 0;
        }

        .badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 11px;
            border: 1px solid var(--main);
        }

        .btn {
            display: block;
            text-align: center;
            padding: 14px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn-outline {
            border: 1.5px dashed var(--accent);
            color: var(--white);
            margin: 25px 0;
        }

        .btn-main {
            background: linear-gradient(45deg, var(--main), var(--accent));
            color: #fff;
            box-shadow: 0 4px 15px var(--glow);
            margin-top: 30px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(187, 134, 252, 0.3);
            border-radius: 18px;
            padding: 10px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-3px);
            border-color: var(--main);
            box-shadow: 0 5px 15px var(--glow);
        }

        .card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .footer {
            text-align: center;
            margin-top: 50px;
        }

        .contact-label {
            font-size: 14px;
            color: var(--white);
            font-weight: 500;
            margin-bottom: 12px;
        }

        .social-group {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .social-btn {
            padding: 5px 12px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--main);
            color: #fff;
            text-decoration: none;
            font-size: 10.5px;
            transition: 0.3s;
        }

        .social-btn:hover {
            background: var(--main);
            transform: translateY(-2px);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: linear-gradient(135deg, var(--status-from), var(--status-to));
            color: #1a3a1a;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 7px 18px;
            border-radius: 20px;
            box-shadow: 0 3px 12px rgba(100, 190, 95, 0.28);
            margin-top: 10px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            background: #1a3a1a;
            border-radius: 50%;
            animation: blink 1.6s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.25; }
        }

        .price-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 15px;
            text-align: center;
            border: 1px solid var(--main);
        }

        .price-amount {
            font-size: 2rem;
            font-weight: 600;
            color: var(--main);
            line-height: 1.2;
        }

        .do-dont-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .do-box {
            background: var(--do-bg);
            border: 1.5px solid var(--do-border);
            border-radius: 16px;
            padding: 14px;
            color: #1a3a1a;
        }

        .dont-box {
            background: var(--dont-bg);
            border: 1.5px solid var(--dont-border);
            border-radius: 16px;
            padding: 14px;
            color: #8b3a3a;
        }

        .step-num {
            width: 32px;
            height: 32px;
            background: var(--main);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            color: #0B0B2A;
            flex-shrink: 0;
        }

        .tl-item {
            border-radius: 14px;
            padding: 12px 10px;
            text-align: center;
        }

        .tl-item.fast {
            background: rgba(184, 232, 176, 0.2);
            border: 1.5px solid #B8E6B0;
        }

        .tl-item.mid {
            background: rgba(187, 134, 252, 0.2);
            border: 1.5px solid var(--main);
        }

        .tl-item.slow {
            background: rgba(255, 192, 160, 0.2);
            border: 1.5px solid #FFBCBC;
        }

        .pay-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--main);
            border-radius: 12px;
            padding: 9px 14px;
            font-size: 0.83rem;
            color: var(--text-soft);
        }

        /* Admin Panel Styles */
        #admin-fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--main), var(--accent));
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 20px var(--glow);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
            z-index: 9999;
        }

        #admin-fab:hover {
            transform: scale(1.1) rotate(90deg);
        }

        #admin-overlay, #login-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            z-index: 10000;
            overflow-y: auto;
            padding: 20px;
        }

        #admin-overlay.show, #login-overlay.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #admin-panel {
            background: #1a1a2e;
            border-radius: 22px;
            padding: 28px;
            width: 100%;
            max-width: 1000px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            border: 2px solid var(--main);
            box-shadow: 0 0 30px var(--glow);
        }

        .admin-section {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 16px;
            border: 1px solid rgba(187, 134, 252, 0.3);
        }

        .admin-input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #333;
            border-radius: 10px;
            font-family: 'Mitr', sans-serif;
            font-size: 0.88rem;
            outline: none;
            transition: 0.2s;
            background: #2a2a3a;
            color: white;
        }

        .admin-input:focus {
            border-color: var(--main);
        }

        .admin-btn-save {
            background: linear-gradient(135deg, var(--main), var(--accent));
            color: white;
            border: none;
            padding: 11px 22px;
            border-radius: 30px;
            font-family: 'Mitr', sans-serif;
            font-weight: 500;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .admin-btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--glow);
        }

        .admin-btn-add {
            background: #2a2a3a;
            color: var(--main);
            border: 1px solid var(--main);
            padding: 8px 16px;
            border-radius: 30px;
            font-family: 'Mitr', sans-serif;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .admin-btn-add:hover {
            background: var(--main);
            color: #0B0B2A;
        }

        .admin-btn-del {
            background: #ffebee;
            color: #f44336;
            border: none;
            padding: 6px 12px;
            border-radius: 20px;
            font-family: 'Mitr', sans-serif;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .tab-btn {
            padding: 9px 18px;
            border: 1.5px solid #333;
            background: #1a1a2e;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Mitr', sans-serif;
            font-size: 0.85rem;
            color: #fff;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: var(--main);
            color: #0B0B2A;
            border-color: var(--main);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .item-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .item-row .admin-input {
            flex: 1;
        }

        .color-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .color-row label {
            min-width: 120px;
            color: #fff;
        }

        .color-input-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .color-swatch {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 2px solid #444;
            cursor: pointer;
        }

        .color-text {
            width: 100px;
            padding: 6px 10px;
            border: 1.5px solid #333;
            border-radius: 8px;
            background: #2a2a3a;
            color: white;
        }

        #toast {
            position: fixed;
            bottom: 100px;
            right: 24px;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            z-index: 9998;
            display: none;
            align-items: center;
            gap: 8px;
        }

        #toast.show {
            display: flex;
            animation: slideIn 0.3s ease;
        }

        #toast.success { background: #4CAF50; }
        #toast.error { background: #f44336; }
        #toast.info { background: #2196F3; }

        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        #loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        #loading-overlay.hidden {
            display: none;
        }

        .loading-bar-wrap {
            width: 200px;
            height: 4px;
            background: #2a2a3a;
            border-radius: 4px;
            overflow: hidden;
        }

        .loading-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--main), var(--accent));
            animation: loadBar 1.5s ease-in-out infinite;
        }

        @keyframes loadBar {
            0% { width: 0%; margin-left: 0; }
            50% { width: 60%; margin-left: 20%; }
            100% { width: 0%; margin-left: 100%; }
        }

        .cmodal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(6px);
            z-index: 10001;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .cmodal-overlay.show {
            display: flex;
        }

        .cmodal-box {
            background: #1a1a2e;
            border-radius: 22px;
            padding: 36px 32px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 2px solid var(--main);
            box-shadow: 0 0 30px var(--glow);
        }

        .cmodal-btn {
            padding: 11px 24px;
            border-radius: 30px;
            font-family: 'Mitr', sans-serif;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            margin: 0 5px;
        }

        .cmodal-btn-confirm {
            background: var(--main);
            color: #0B0B2A;
        }

        .cmodal-btn-cancel {
            background: #2a2a3a;
            color: white;
        }

        .cmodal-btn-danger {
            background: #f44336;
            color: white;
        }

        @media(max-width:500px) {
            .do-dont-grid {
                grid-template-columns: 1fr;
            }
            #admin-panel {
                padding: 16px;
            }
            .contact-btns.cols-2,
            .contact-btns.cols-3 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <!-- Loading -->
    <div id="loading-overlay">
        <div style="font-size:3rem; animation: pulse-glow 2s infinite;">✨</div>
        <div style="color: var(--white);">กำลังโหลดข้อมูล...</div>
        <div class="loading-bar-wrap">
            <div class="loading-bar"></div>
        </div>
    </div>

    <!-- Background Emojis -->
    <div class="bg-emojis" id="bg-emojis-container"></div>

    <!-- Main Content -->
    <div class="container" id="main-content"></div>

    <!-- Admin FAB -->
    <button id="admin-fab" title="จัดการร้านค้า">
        <i class="fas fa-cog"></i>
    </button>

    <!-- Toast -->
    <div id="toast"></div>

    <!-- Custom Modal -->
    <div id="cmodal" class="cmodal-overlay">
        <div class="cmodal-box">
            <div id="cmodal-icon" style="font-size:3rem; margin-bottom:14px;"></div>
            <div id="cmodal-title" style="font-size:1.2rem; font-weight:600; color: var(--white); margin-bottom:8px;"></div>
            <div id="cmodal-text" style="font-size:0.88rem; color: var(--text-soft); margin-bottom:20px;"></div>
            <div id="cmodal-actions" style="display:flex; gap:10px; justify-content:center;"></div>
        </div>
    </div>

    <!-- Login Overlay -->
    <div id="login-overlay">
        <div style="background: #1a1a2e; border-radius:22px; padding:40px 32px; width:100%; max-width:360px; border:2px solid var(--main);">
            <div style="text-align:center; margin-bottom:24px;">
                <div style="font-size:2.5rem;">🔐</div>
                <h2 style="color: var(--white);">เข้าสู่ระบบ</h2>
            </div>
            <input type="text" id="login-user" class="admin-input" placeholder="Username" style="margin-bottom:12px;">
            <input type="password" id="login-pass" class="admin-input" placeholder="Password" style="margin-bottom:16px;">
            <div style="display:flex; gap:10px;">
                <button onclick="doLogin()" class="admin-btn-save" style="flex:1;">เข้าสู่ระบบ</button>
                <button onclick="closeLogin()" class="admin-btn-add" style="flex:1;">ยกเลิก</button>
            </div>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="admin-overlay">
        <div id="admin-panel">
            <button onclick="closeAdmin()" style="position:absolute; top:18px; right:18px; background:#2a2a3a; border:none; width:40px; height:40px; border-radius:50%; color:white; cursor:pointer;">
                <i class="fas fa-times"></i>
            </button>

            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; flex-wrap:wrap;">
                <h2 style="color: var(--white);"><i class="fas fa-sliders-h" style="color: var(--main);"></i> จัดการร้าน Fumiko Poko</h2>
                <button onclick="adminLogout()" class="admin-btn-del" style="display:flex; align-items:center; gap:6px;">
                    <i class="fas fa-sign-out-alt"></i> ออกจากระบบ
                </button>
            </div>

            <!-- Export/Import -->
            <div style="display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap;">
                <button onclick="exportData()" class="admin-btn-add"><i class="fas fa-download"></i> Export</button>
                <button onclick="document.getElementById('import-file').click()" class="admin-btn-add"><i class="fas fa-upload"></i> Import</button>
                <button onclick="syncWithGoogleSheets()" class="admin-btn-add"><i class="fas fa-sync-alt"></i> Sync Sheets</button>
                <button onclick="loadFromGoogleSheets(true)" class="admin-btn-add"><i class="fas fa-cloud-download-alt"></i> โหลดจาก Sheets</button>
            </div>
            <input type="file" id="import-file" accept=".json" style="display:none;" onchange="importData(event)">

            <!-- Tabs -->
            <div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px; padding-bottom:14px; border-bottom:2px solid #333;">
                <button class="tab-btn active" onclick="switchTab('tab-header', event)"><i class="fas fa-home"></i> ส่วนหัว</button>
                <button class="tab-btn" onclick="switchTab('tab-colors', event)"><i class="fas fa-palette"></i> สี</button>
                <button class="tab-btn" onclick="switchTab('tab-sections', event)"><i class="fas fa-layer-group"></i> ส่วนต่างๆ</button>
                <button class="tab-btn" onclick="switchTab('tab-portfolio', event)"><i class="fas fa-images"></i> ผลงาน</button>
                <button class="tab-btn" onclick="switchTab('tab-collab', event)"><i class="fas fa-handshake"></i> กลุ่มในเครือ</button>
                <button class="tab-btn" onclick="switchTab('tab-contact', event)"><i class="fas fa-phone"></i> ติดต่อ</button>
                <button class="tab-btn" onclick="switchTab('tab-footer', event)"><i class="fas fa-bookmark"></i> ส่วนท้าย</button>
                <button class="tab-btn" onclick="switchTab('tab-bg-emojis', event)"><i class="fas fa-smile"></i> อิโมจิพื้นหลัง</button>
                <button class="tab-btn" onclick="switchTab('tab-gs', event)"><i class="fab fa-google"></i> Google Sheets</button>
            </div>

            <!-- Tab: Header -->
            <div id="tab-header" class="tab-content active">
                <div class="admin-section">
                    <h3 style="color: var(--white); margin-bottom:14px;"><i class="fas fa-image" style="color: var(--main);"></i> รูปโลโก้</h3>
                    <input type="text" id="a-logo-img" class="admin-input" placeholder="URL รูปโลโก้">
                </div>
                <div class="admin-section">
                    <h3 style="color: var(--white); margin-bottom:14px;"><i class="fas fa-store" style="color: var(--main);"></i> ข้อมูลร้าน</h3>
                    <input type="text" id="a-shop-name" class="admin-input" placeholder="ชื่อร้าน" style="margin-bottom:10px;">
                    <textarea id="a-shop-desc" class="admin-input" placeholder="คำอธิบาย" rows="3" style="margin-bottom:10px;"></textarea>

        // ==================== UTILITY FUNCTIONS ====================
        function loadData() {
            try {
                const saved = localStorage.getItem(DATA_KEY);
                return saved ? JSON.parse(saved) : DEFAULT_DATA;
            } catch {
                return DEFAULT_DATA;
            }
        }

        function saveData(data, showToast_notify = true) {
            localStorage.setItem(DATA_KEY, JSON.stringify(data));
            if (showToast_notify) showToast('✅ บันทึกเรียบร้อย', 'success');
            renderSite();
            if (document.getElementById('admin-overlay').classList.contains('show')) {
                renderAdminForms();
            }

        function loadColors() {
            try {
                return { ...DEFAULT_COLORS, ...JSON.parse(localStorage.getItem(COLOR_KEY) || '{}') };
            } catch {
                return DEFAULT_COLORS;
            }
        }

        function applyColors(colors) {
            const root = document.documentElement.style;
            root.setProperty('--main', colors.main);
            root.setProperty('--bg', colors.bg);
            root.setProperty('--white', colors['text-main']);
            root.setProperty('--accent', colors.accent);
            root.setProperty('--glow', `rgba(${hexToRgb(colors.main)}, 0.5)`);
            document.body.style.background = colors.bg;
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : '187, 134, 252';
        }

        function syncColorText(key, value) {
            document.getElementById(`color-${key}-text`).value = value;
            applyColorLive(key, value);
        }

        function syncColorPicker(key, value) {
            if (/^#[0-9A-F]{6}$/i.test(value)) {
                document.getElementById(`color-${key}`).value = value;
                applyColorLive(key, value);
            }
        }

        function applyColorLive(key, value) {
            const root = document.documentElement.style;
            if (key === 'main') {
                root.setProperty('--main', value);
                root.setProperty('--glow', `rgba(${hexToRgb(value)}, 0.5)`);
            } else if (key === 'bg') {
                root.setProperty('--bg', value);
                document.body.style.background = value;
            } else if (key === 'text-main') {
                root.setProperty('--white', value);
            } else if (key === 'accent') {
                root.setProperty('--accent', value);
            }
        }

        function saveColors() {

                logoImg: document.getElementById('a-logo-img').value,
                shopName: document.getElementById('a-shop-name').value,
                shopDesc: document.getElementById('a-shop-desc').value,
                statusText: document.getElementById('a-status-text').value,
                badges: [
                    document.getElementById('a-badge1').value,
                    document.getElementById('a-badge2').value,
                    document.getElementById('a-badge3').value
                ].filter(b => b.trim() !== ''),
                queueLink: document.getElementById('a-queue-link').value
            };
            saveData(data);
        }

        function updateDetailImage(value) {
            const data = loadData();
            data.detailImage = value;
            saveData(data, false);
        }

        function updatePortfolioItem(index, field, value) {
            const data = loadData();
            data.portfolio[index][field] = value;
            saveData(data, false);
        }

        function deletePortfolioItem(index) {
            showConfirm('ลบผลงานนี้?', 'คุณแน่ใจหรือไม่?', () => {
                const data = loadData();
                data.portfolio.splice(index, 1);
                saveData(data);
                renderAdminForms();
            });
        }

        function addPortfolioItem() {
            const data = loadData();
            data.portfolio.push({ title: 'ผลงานใหม่', image: '', link: '#' });
            saveData(data);
            renderAdminForms();
        }

        function updateCollabItem(index, field, value) {
            const data = loadData();
            data.collab[index][field] = value;
            saveData(data, false);
        }

        function deleteCollabItem(index) {
            showConfirm('ลบกลุ่มในเครือ?', 'คุณแน่ใจหรือไม่?', () => {
                const data = loadData();
                data.collab.splice(index, 1);
                saveData(data);
                renderAdminForms();
            });
        }

        function addCollabItem() {
            const data = loadData();
            data.collab.push({ title: 'กลุ่มใหม่', image: '', link: '#' });
            saveData(data);
            renderAdminForms();
        }

        function updateContactItem(index, field, value) {
            const data = loadData();
            data.contact[index][field] = value;
            saveData(data, false);
        }

        function deleteContactItem(index) {
            showConfirm('ลบช่องทางติดต่อ?', 'คุณแน่ใจหรือไม่?', () => {
                const data = loadData();
                data.contact.splice(index, 1);
                saveData(data);
                renderAdminForms();
            });
        }

        function addContactItem() {
            const data = loadData();
            data.contact.push({ type: 'custom', text: 'ช่องทางใหม่', link: '#' });
            saveData(data);
            renderAdminForms();
        }

        function saveFooter() {
            const data = loadData();
            data.footer = document.getElementById('a-footer-copyright').value;
            saveData(data);
        }

        function updateBgEmoji(index, value) {
            const data = loadData();
            data.bgEmojis[index] = value;
            saveData(data, false);
        }

        function deleteBgEmoji(index) {
            showConfirm('ลบอิโมจินี้?', 'คุณแน่ใจหรือไม่?', () => {
                const data = loadData();
                data.bgEmojis.splice(index, 1);
                saveData(data);
                renderAdminForms();
            });
        }

        function addBgEmoji() {
            const data = loadData();
            data.bgEmojis.push('✨');
            saveData(data);
            renderAdminForms();
        }

        function addSection(type) {
            if (type === 'about') {
                const data = loadData();
                // สามารถเพิ่ม section เพิ่มเติมได้ตามต้องการ
                showToast('📝 กำลังเพิ่มส่วน...', 'info');
            }
        }

        // ==================== ADMIN PANEL CONTROLS ====================
        function openAdmin() {
            if (!isAdminLoggedIn) {
                document.getElementById('login-overlay').classList.add('show');
                document.getElementById('login-user').focus();
                return;
            }
            renderAdminForms();
            fillColorAdmin(loadColors());
            document.getElementById('admin-overlay').classList.add('show');
            startAutoSave();
        }

        function closeAdmin() {
            document.getElementById('admin-overlay').classList.remove('show');
            if (autoSaveTimer) {
                clearInterval(autoSaveTimer);
                autoSaveTimer = null;
            }
        }

        function closeLogin() {
            document.getElementById('login-overlay').classList.remove('show');
            document.getElementById('login-user').value = '';
            document.getElementById('login-pass').value = '';
        }

        function doLogin() {
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;
            if (user === ADMIN_CREDS.user && pass === ADMIN_CREDS.pass) {
                closeLogin();
                isAdminLoggedIn = true;
                openAdmin();
            } else {
                showToast('❌ ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง', 'error');
            }
        }

        function adminLogout() {
            isAdminLoggedIn = false;
            closeAdmin();
            showToast('👋 ออกจากระบบแล้ว', 'success');
        }

        function switchTab(tabId, event) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if (event) event.target.classList.add('active');
        }

        function startAutoSave() {
            if (autoSaveTimer) clearInterval(autoSaveTimer);
            autoSaveTimer = setInterval(() => {
                if (document.getElementById('admin-overlay').classList.contains('show')) {
                    // Auto save current data
                    const data = loadData();
                    localStorage.setItem(DATA_KEY, JSON.stringify(data));
                }
            }, 60000);
        }

        // ==================== MODAL & TOAST ====================
        function showToast(message, type = 'success', duration = 2000) {
            const toast = document.getElementById('toast');
            toast.className = `show ${type}`;
            toast.innerHTML = message;
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), duration);
        }

        function showConfirm(title, message, onConfirm) {
            const modal = document.getElementById('cmodal');
            document.getElementById('cmodal-icon').innerHTML = '❓';
            document.getElementById('cmodal-title').textContent = title;
            document.getElementById('cmodal-text').innerHTML = message;
            document.getElementById('cmodal-actions').innerHTML = `
                <button class="cmodal-btn cmodal-btn-confirm" onclick="confirmAction(true)">ยืนยัน</button>
                <button class="cmodal-btn cmodal-btn-cancel" onclick="closeModal()">ยกเลิก</button>
            `;
            modal.classList.add('show');
            window._confirmCallback = onConfirm;
        }

        function confirmAction(confirmed) {
            if (confirmed && window._confirmCallback) {
                window._confirmCallback();
            }
            closeModal();
        }

        function closeModal() {
            document.getElementById('cmodal').classList.remove('show');
        }

        // ==================== EXPORT / IMPORT ====================
        function exportData() {
            const data = loadData();
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `fumiko-backup-${new Date().toISOString().slice(0, 10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('📥 ส่งออกข้อมูลสำเร็จ', 'success');
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    localStorage.setItem(DATA_KEY, JSON.stringify(data));
                    showToast('📤 นำเข้าข้อมูลสำเร็จ', 'success');
                    renderSite();
                    if (document.getElementById('admin-overlay').classList.contains('show')) {
                        renderAdminForms();
                    }
                } catch {
                    showToast('❌ ไฟล์ไม่ถูกต้อง', 'error');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // ==================== GOOGLE SHEETS ====================
        function getGsConfig() {
            return JSON.parse(localStorage.getItem(GS_CONFIG_KEY) || '{}');
        }

        function saveGsConfig() {
            const config = {
                webAppUrl: document.getElementById('gs-webapp-url').value,
                sheetId: document.getElementById('gs-sheet-id').value
            };
            localStorage.setItem(GS_CONFIG_KEY, JSON.stringify(config));
            showToast('💾 บันทึกการตั้งค่าแล้ว', 'success');
        }

        async function testGsConnection() {
            const url = document.getElementById('gs-webapp-url').value;
            if (!url) {
                showToast('⚠️ กรุณากรอก Web App URL', 'error');
                return;
            }
            try {
                const response = await fetch(url + '?action=ping');
                const text = await response.text();
                showToast('✅ เชื่อมต่อสำเร็จ', 'success');
            } catch {
                showToast('❌ ไม่สามารถเชื่อมต่อได้', 'error');
            }
        }

        async function loadFromGoogleSheets(showUI = true) {
            const config = getGsConfig();
            if (!config.webAppUrl) {
                if (showUI) showToast('⚠️ ไม่ได้ตั้งค่า Web App URL', 'error');
                return;
            }
            try {
                const response = await fetch(config.webAppUrl + '?action=getData');
                const result = await response.json();
                if (result.status === 'success' && result.data) {
                    localStorage.setItem(DATA_KEY, JSON.stringify(result.data));
                    if (showUI) showToast('✅ โหลดข้อมูลสำเร็จ', 'success');
                    renderSite();
                    if (document.getElementById('admin-overlay').classList.contains('show')) {
                        renderAdminForms();
                    }
                }
            } catch {
                if (showUI) showToast('❌ โหลดข้อมูลล้มเหลว', 'error');
            }
        }

        async function syncWithGoogleSheets() {
            const config = getGsConfig();
            if (!config.webAppUrl) {
                showToast('⚠️ ไม่ได้ตั้งค่า Web App URL', 'error');
                return;
            }
            showConfirm('ซิงค์กับ Google Sheets', 'เลือกทิศทางการซิงค์', async () => {
                try {
                    const data = loadData();
                    await fetch(config.webAppUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ action: 'updateData', data })
                    });
                    showToast('📤 อัปโหลดข้อมูลสำเร็จ', 'success');
                } catch {
                    showToast('❌ อัปโหลดล้มเหลว', 'error');
                }
            });
        }

        // ==================== INIT ====================
        async function initApp() {
            // Load from Google Sheets if configured
            await loadFromGoogleSheets(false);
            renderSite();
            document.getElementById('loading-overlay').classList.add('hidden');
        }

        // Event listeners
        document.getElementById('admin-fab').addEventListener('click', openAdmin);
        document.getElementById('login-pass').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') doLogin();
        });
        document.getElementById('admin-overlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeAdmin();
        });
        document.getElementById('login-overlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) closeLogin();
        });

        // Start
        initApp();
    </script>
</body>
