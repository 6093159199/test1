<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fumiko Poko - Official ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'float': 'float 5s ease-in-out infinite',
                        'blink': 'blink 1.6s ease-in-out infinite',
                        'slideUp': 'slideUp 0.55s ease both',
                        'spin-slow': 'spin 3s linear infinite',
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg: #0B0B2A;
            --main: #BB86FC;
            --dark: #C084FC;
            --white: #FFFFFF;
            --glow: rgba(187, 134, 252, 0.5);
            --accent: #FF71CF;
            --card-bg: rgba(25, 25, 70, 0.45);
            --text-main: #FFFFFF;
            --text-soft: rgba(255, 255, 255, 0.8);
            --text-light: rgba(255, 255, 255, 0.6);
            --font-main: 'Mitr', sans-serif;
            --status-from: #B8E8B0;
            --status-to: #78CC72;
            --do-bg: rgba(76, 175, 80, 0.15);
            --do-border: #4CAF50;
            --dont-bg: rgba(244, 67, 54, 0.15);
            --dont-border: #F44336;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-main);
        }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            color: #fff;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 20% 20%, rgba(187, 134, 252, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(255, 113, 207, 0.15) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        .bg-emojis {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .floating-emoji {
            position: absolute;
            font-size: 22px;
            opacity: 0.5;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.2));
            animation: float-bg 18s infinite linear;
        }

        @keyframes float-bg {
            0% {
                transform: translateY(110vh) rotate(0deg);
            }
            100% {
                transform: translateY(-10vh) rotate(360deg);
            }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-7px); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.25; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(18px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .loading-spin {
            animation: spin 1s linear infinite;
        }

        .container {
            max-width: 500px;
            width: 100%;
            padding: 20px 15px 60px;
            position: relative;
            z-index: 1;
        }

        .header-box {
            text-align: center;
            padding: 40px 15px 30px;
        }

        h1 {
            color: var(--white);
            text-shadow: 2px 2px 8px rgba(187, 134, 252, 0.5);
            font-size: 32px;
            margin-bottom: 10px;
        }

        .logo-wrapper {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-glow {
            position: absolute;
            width: 115%;
            height: 115%;
            background: var(--main);
            border-radius: 50%;
            filter: blur(35px);
            opacity: 0.4;
            animation: pulse-glow 4s infinite alternate;
        }

        .logo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            z-index: 5;
            border: 3px solid var(--white);
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes pulse-glow {
            from { transform: scale(0.95); }
            to { transform: scale(1.05); }
        }

        .section {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 40px;
            border: 2px solid var(--main);
            box-shadow: 0 0 15px var(--glow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: slideUp 0.55s ease both;
        }

        .section:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px var(--glow);
        }

        h2 {
            color: var(--dark);
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        h2::after {
            content: '';
            flex: 1;
            height: 1.5px;
            background: linear-gradient(to right, var(--main), transparent);
            opacity: 0.45;
            border-radius: 2px;
        }

        .badge-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin: 15px 0;
        }

        .badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 11px;
            border: 1px solid var(--main);
        }

        .btn {
            display: block;
            text-align: center;
            padding: 14px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn-outline {
            border: 1.5px dashed var(--accent);
            color: var(--white);
            margin: 25px 0;
        }

        .btn-main {
            background: linear-gradient(45deg, var(--main), var(--accent));
            color: #fff;
            box-shadow: 0 4px 15px var(--glow);
            margin-top: 30px;
        }

        .btn-main:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px var(--glow);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(187, 134, 252, 0.3);
            border-radius: 18px;
            padding: 10px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.03);
            border-color: var(--main);
        }

        .card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .footer {
            text-align: center;
            margin-top: 50px;
        }

        .contact-label {
            font-size: 14px;
            color: var(--white);
            font-weight: 500;
            margin-bottom: 12px;
        }

        .social-group {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .social-btn {
            padding: 8px 16px;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--main);
            color: #fff;
            text-decoration: none;
            font-size: 12px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .social-btn:hover {
            background: var(--main);
            color: var(--bg);
            transform: translateY(-2px);
        }

        /* Status badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: linear-gradient(135deg, var(--status-from), var(--status-to));
            color: #1a4d1a;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 7px 18px;
            border-radius: 20px;
            box-shadow: 0 3px 12px rgba(100, 190, 95, 0.28);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            background: white;
            border-radius: 50%;
            animation: blink 1.6s ease-in-out infinite;
        }

        /* Group items */
        .group-item {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(187, 134, 252, 0.3);
            border-radius: 18px;
            padding: 15px;
            transition: transform 0.2s;
        }

        .group-item:hover {
            transform: translateY(-2px);
            border-color: var(--main);
        }

        .gi-price {
            background: linear-gradient(135deg, var(--main), var(--accent));
            color: white;
            font-size: 1rem;
            font-weight: 600;
            padding: 4px 12px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(187, 134, 252, 0.3);
        }

        .gi-tag {
            background: rgba(187, 134, 252, 0.1);
            border: 1px solid rgba(187, 134, 252, 0.3);
            border-radius: 12px;
            padding: 3px 10px;
            font-size: 0.75rem;
            color: var(--text-soft);
        }

        .gi-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(187, 134, 252, 0.4);
            border-radius: 15px;
            padding: 5px 12px;
            font-size: 0.76rem;
            color: var(--white);
            text-decoration: none;
            transition: all 0.2s;
        }

        .gi-link:hover {
            background: var(--main);
            color: var(--bg);
            border-color: var(--main);
        }

        .see-all-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px;
            border-radius: 25px;
            background: linear-gradient(135deg, var(--main), var(--accent));
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: 0 4px 16px var(--glow);
            transition: all 0.25s;
        }

        .see-all-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px var(--glow);
        }

        /* Admin Panel */
        #admin-fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--main), var(--accent));
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 4px 20px var(--glow);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        #admin-fab:hover {
            transform: scale(1.1) rotate(90deg);
        }

        #toast {
            position: fixed;
            bottom: 100px;
            right: 24px;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            z-index: 9998;
            display: none;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        #toast.show {
            display: flex;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        #toast.success { background: #4CAF50; }
        #toast.error { background: #f44336; }
        #toast.info { background: #2196F3; }
        #toast.warning { background: #FF9800; }

        #loading-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 99999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        #loading-overlay.hidden {
            display: none;
        }

        .loading-bar-wrap {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .loading-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--main), var(--accent));
            border-radius: 4px;
            animation: loadBar 1.5s ease-in-out infinite;
        }

        @keyframes loadBar {
            0% { width: 0%; margin-left: 0; }
            50% { width: 60%; margin-left: 20%; }
            100% { width: 0%; margin-left: 100%; }
        }

        #login-overlay,
        #admin-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 10000;
            overflow-y: auto;
            padding: 20px;
        }

        #login-overlay.show,
        #admin-overlay.show {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #admin-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 2px solid var(--main);
            border-radius: 25px;
            padding: 28px;
            width: 100%;
            max-width: 1000px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            color: white;
        }

        .admin-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(187, 134, 252, 0.3);
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 16px;
        }

        .admin-input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid rgba(187, 134, 252, 0.3);
            border-radius: 12px;
            font-family: var(--font-main);
            font-size: 0.88rem;
            outline: none;
            transition: border 0.2s;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .admin-input:focus {
            border-color: var(--main);
        }

        .admin-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .admin-btn-save {
            background: linear-gradient(135deg, var(--main), var(--accent));
            color: white;
            border: none;
            padding: 11px 22px;
            border-radius: 30px;
            font-family: var(--font-main);
            font-weight: 500;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .admin-btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--glow);
        }

        .admin-btn-add {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid var(--main);
            padding: 8px 16px;
            border-radius: 30px;
            font-family: var(--font-main);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .admin-btn-add:hover {
            background: var(--main);
            color: var(--bg);
        }

        .admin-btn-del {
            background: rgba(244, 67, 54, 0.2);
            color: #ff6b6b;
            border: 1px solid #f44336;
            padding: 6px 12px;
            border-radius: 20px;
            font-family: var(--font-main);
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .admin-btn-del:hover {
            background: #f44336;
            color: white;
        }

        .tab-btn {
            padding: 9px 18px;
            border: 1.5px solid rgba(187, 134, 252, 0.3);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            cursor: pointer;
            font-family: var(--font-main);
            font-size: 0.85rem;
            color: white;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--main), var(--accent));
            color: white;
            border-color: transparent;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .item-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .item-row .admin-input {
            margin-bottom: 0;
            flex: 1;
        }

        .badge-global {
            background: rgba(33, 150, 243, 0.2);
            color: #90caf9;
            border: 1px solid #2196F3;
        }

        .badge-assigned {
            background: rgba(187, 134, 252, 0.2);
            color: var(--main);
            border: 1px solid var(--main);
        }

        .cmodal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(6px);
            z-index: 10001;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .cmodal-overlay.show {
            display: flex;
        }

        .cmodal-box {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 2px solid var(--main);
            border-radius: 25px;
            padding: 36px 32px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease;
            color: white;
        }

        .cmodal-btn {
            padding: 11px 24px;
            border-radius: 30px;
            font-family: var(--font-main);
            font-size: 0.9rem;
            font-weight: 500;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .cmodal-btn-confirm {
            background: linear-gradient(135deg, var(--main), var(--accent));
            color: white;
        }

        .cmodal-btn-cancel {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .cmodal-btn-danger {
            background: #f44336;
            color: white;
        }

        .color-section-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--dark);
            padding: 8px 0 6px;
            border-bottom: 1.5px solid rgba(187, 134, 252, 0.3);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .color-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .color-row label {
            font-size: 0.82rem;
            color: var(--text-soft);
            min-width: 120px;
        }

        .color-input-wrap {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .color-swatch {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 2px solid rgba(187, 134, 252, 0.3);
            cursor: pointer;
            flex-shrink: 0;
            background: transparent;
        }

        .color-text {
            width: 100px;
            padding: 6px 10px;
            border: 1.5px solid rgba(187, 134, 252, 0.3);
            border-radius: 8px;
            font-size: 0.82rem;
            font-family: monospace;
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .color-text:focus {
            border-color: var(--main);
        }

        .font-option {
            border: 2px solid rgba(187, 134, 252, 0.3);
            border-radius: 14px;
            padding: 14px 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .font-option:hover {
            border-color: var(--main);
        }

        .font-option.selected {
            border-color: var(--main);
            background: rgba(187, 134, 252, 0.2);
            box-shadow: 0 3px 12px var(--glow);
        }

        .history-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(187, 134, 252, 0.3);
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
        }

        .history-item:hover {
            border-color: var(--main);
            transform: translateX(5px);
        }

        .gs-ok {
            background: rgba(76, 175, 80, 0.2);
            color: #81c784;
        }

        .gs-err {
            background: rgba(244, 67, 54, 0.2);
            color: #ff8a80;
        }

        .gs-loading {
            background: rgba(33, 150, 243, 0.2);
            color: #90caf9;
        }

        @media(max-width:500px) {
            .container {
                padding: 10px 10px 40px;
            }
            
            .section {
                padding: 20px 15px;
            }
            
            .grid {
                gap: 10px;
            }
            
            .contact-btns.cols-2,
            .contact-btns.cols-3 {
                grid-template-columns: 1fr;
            }
            
            #admin-panel {
                padding: 16px;
            }
        }
    </style>
</head>

<body>

    <!-- Loading -->
    <div id="loading-overlay">
        <div style="font-size:3rem;animation:float 2s ease-in-out infinite;">✨</div>
        <div style="font-size:1rem;color:var(--text-soft);">กำลังโหลดข้อมูล...</div>
        <div class="loading-bar-wrap">
            <div class="loading-bar"></div>
        </div>
    </div>

    <!-- Background Emojis -->
    <div class="bg-emojis" id="bg-emojis-container"></div>

    <!-- Main Content -->
    <div class="container" id="main-content"></div>

    <!-- Admin FAB -->
    <button id="admin-fab" title="Admin Panel">
        <i class="fas fa-cog"></i>
    </button>

    <!-- Toast -->
    <div id="toast"></div>

    <!-- Custom Modal -->
    <div id="cmodal" class="cmodal-overlay">
        <div class="cmodal-box">
            <div id="cmodal-icon" style="font-size:3rem;margin-bottom:14px;"></div>
            <div id="cmodal-title" style="font-size:1.2rem;font-weight:600;margin-bottom:8px;"></div>
            <div id="cmodal-text" style="font-size:0.88rem;color:var(--text-soft);line-height:1.7;margin-bottom:20px;"></div>
            <div id="cmodal-actions" style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;"></div>
        </div>
    </div>

    <!-- Login -->
    <div id="login-overlay">
        <div class="admin-section" style="max-width:360px;width:100%;">

                html += `<div class="history-item" onclick="restoreHistory(${i});closeModal()">

        function showModal({ icon = '', title = '', html = '', confirmText = 'ตกลง', cancelText = null, dangerConfirm = false, timer }) {
            return new Promise(resolve => {
                const iconMap = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️', question: '❓' };
                document.getElementById('cmodal-icon').textContent = iconMap[icon] || icon;
                document.getElementById('cmodal-title').textContent = title;
                document.getElementById('cmodal-text').innerHTML = html;
                const actions = document.getElementById('cmodal-actions');
                actions.innerHTML = '';
                const confirmBtn = document.createElement('button');
                confirmBtn.className = 'cmodal-btn ' + (dangerConfirm ? 'cmodal-btn-danger' : 'cmodal-btn-confirm');
                confirmBtn.textContent = confirmText;
                confirmBtn.onclick = () => { closeModal(); resolve({ isConfirmed: true }); };
                actions.appendChild(confirmBtn);
                if (cancelText) {
                    const cancelBtn = document.createElement('button');
                    cancelBtn.className = 'cmodal-btn cmodal-btn-cancel';
                    cancelBtn.textContent = cancelText;
                    cancelBtn.onclick = () => { closeModal(); resolve({ isConfirmed: false, dismiss: 'cancel' }); };
                    actions.appendChild(cancelBtn);
                }
                document.getElementById('cmodal').classList.add('show');
                if (timer) setTimeout(() => { closeModal(); resolve({ isConfirmed: false, dismiss: 'timer' }); }, timer);
            });
        }

        function closeModal() {
            document.getElementById('cmodal').classList.remove('show');
        }

            const t = document.getElementById('toast');

        }

        function fetchViaJsonp(url, timeoutMs = 10000) {
            return new Promise((resolve, reject) => {
                const cbName = 'jsonp_cb_' + Math.round(100000 * Math.random()) + '_' + Date.now();
                let script = null, timer = null;
                function cleanup() {
                    if (timer) clearTimeout(timer);
                    if (window[cbName]) delete window[cbName];
                    if (script && script.parentNode) script.parentNode.removeChild(script);
                }
                window[cbName] = function (data) { cleanup(); resolve(data); };
                timer = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, timeoutMs);
                script = document.createElement('script');
                const sep = url.includes('?') ? '&' : '?';
                script.src = url + sep + 'callback=' + cbName;
                script.onerror = () => { cleanup(); reject(new Error('load fail')); };
                document.body.appendChild(script);
            });
        }

        async function loadFromGoogleSheets(showUI) {
            const config = getGsConfig();
            const url = config.webAppUrl;
            if (!url) {
                if (showUI) showModal({ icon: 'warning', title: 'ไม่ได้ตั้งค่า Web App URL', html: 'กรุณาใส่ Web App URL', confirmText: 'ตกลง' });
                return false;
            }
            if (showUI) showToast('<i class="fas fa-spinner loading-spin"></i> กำลังโหลดจาก Sheets...', 'info', 10000);
            try {
                const result = await fetchViaJsonp(url.replace(/\/$/, '') + `?action=getData`, 10000);
                if (result && result.status === 'success' && result.data) {
                    localStorage.setItem(DATA_KEY, JSON.stringify(result.data));
                    if (showUI) {
                        showToast('✅ โหลดข้อมูลสำเร็จ');
                        renderSite();
                        if (document.getElementById('admin-overlay').classList.contains('show')) openAdmin();
                    }
                    return true;
                } else throw new Error('Invalid data');
            } catch (error) {
                console.warn('GS load failed:', error.message);
                if (showUI) showModal({ icon: 'error', title: 'โหลดข้อมูลล้มเหลว', html: 'ไม่สามารถเชื่อมต่อ Google Sheets ได้', confirmText: 'ตกลง' });
                return false;
            }
        }

        async function saveToGoogleSheets(data) {
            const config = getGsConfig();
            if (!config.webAppUrl) return false;
            try {
                await fetch(config.webAppUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'updateData', data })
                });
                return true;
            } catch {
                return false;
            }
        }

                    return `<div class="section"><h2>${section.title}</h2><img src="${section.imageUrl}" style="width:100%; border-radius:15px;"></div>`;
                case 'portfolio':
                    return `<div class="section"><h2>${section.title}</h2><div class="grid">${section.items.map(item => 
                        `<a href="${item.link}" target="_blank" class="card"><img src="${item.image}"><span>${item.title}</span></a>`
                    ).join('')}</div></div>`;
                case 'collab':
                    return `<div class="section"><h2>${section.title}</h2><div class="grid">${section.items.map(item => 
                        `<a href="${item.link}" target="_blank" class="card"><img src="${item.image}"><span>${item.title}</span></a>`
                    ).join('')}</div>${section.paymentInfo ? `<p style="text-align:center; margin-top:15px;">${section.paymentInfo}</p>` : ''}</div>`;
                case 'about':
                    return `<div class="section"><h2>${section.title}</h2><p>${section.text}</p></div>`;
                case 'badges':
                    return `<div class="section"><h2>${section.title}</h2><div class="badge-group">${section.badges.map(b => `<span class="badge">${b}</span>`).join('')}</div></div>`;
                case 'text':
                    return `<div class="section"><h2>${section.title}</h2><p>${section.content}</p></div>`;
                default:

            }
        }

        function closeAdmin() {
            document.getElementById('admin-overlay').classList.remove('show');
            if (autoSaveTimer) {
                clearInterval(autoSaveTimer);
                autoSaveTimer = null;
            }
        }

        function closeLogin() {
            document.getElementById('login-overlay').classList.remove('show');
            document.getElementById('login-user').value = '';
            document.getElementById('login-pass').value = '';
        }

        function doLogin() {
            const username = document.getElementById('login-user').value.trim();
            const password = document.getElementById('login-pass').value.trim();
            const creds = getCreds();
            if (username === creds.user && password === creds.pass) {
                closeLogin();
                isAdminLoggedIn = true;
                openAdmin();
            } else {
                showModal({ icon: 'error', title: 'เข้าสู่ระบบล้มเหลว', html: 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง', confirmText: 'ตกลง' });
                document.getElementById('login-pass').value = '';
            }
        }

        function adminLogout() {
            isAdminLoggedIn = false;
            closeAdmin();
            showToast('👋 ออกจากระบบสำเร็จ');
        }

        function switchTab(tabId, event) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if (event && event.target) event.target.classList.add('active');
            if (tabId === 'tab-font') renderFontGrid();
            if (tabId === 'tab-colors') fillColorAdmin(loadColors());
        }

        function startAutoSave() {
            if (autoSaveTimer) clearInterval(autoSaveTimer);
            autoSaveTimer = setInterval(() => {
                if (document.getElementById('admin-overlay').classList.contains('show')) {
                    saveData(loadData(), false, false);
                }
            }, 60000);
        }

        // ==================== EXPORT/IMPORT ====================
        function exportData() {
            const data = loadData();
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `fumiko-backup-${new Date().toISOString().slice(0, 10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    saveData(data, true, true);
                    showToast('✅ นำเข้าข้อมูลสำเร็จ');
                    openAdmin();
                } catch {
                    showModal({ icon: 'error', title: 'ไฟล์ไม่ถูกต้อง', html: 'กรุณาเลือกไฟล์ JSON ที่ถูกต้อง', confirmText: 'ตกลง' });
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function syncWithGoogleSheets() {
            showModal({
                icon: 'question',
                title: 'ซิงค์กับ Google Sheets',
                html: 'เลือกทิศทางการซิงค์',
                confirmText: '📤 อัปโหลดไป Sheets',
                cancelText: '📥 ดาวน์โหลดจาก Sheets'
            }).then(r => {
                if (r.isConfirmed) {
                    saveToGoogleSheets(loadData()).then(() => showToast('✅ อัปโหลดสำเร็จ'));
                } else if (r.dismiss === 'cancel') {
                    loadFromGoogleSheets(true);
                }
            });
        }

        // ==================== INIT ====================
        async function initApp() {
            applyFont(selectedFont);
            applyColors(loadColors());
            
            const gsUrl = GS_WEBAPP_URL;
            if (gsUrl && gsUrl !== 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE') {
                await loadFromGoogleSheets(false);
            }
            
            renderSite();
            document.getElementById('loading-overlay').classList.add('hidden');
        }

        // Event Listeners
        document.getElementById('admin-fab').addEventListener('click', openAdmin);
        document.getElementById('login-pass').addEventListener('keypress', e => {
            if (e.key === 'Enter') doLogin();
        });
        document.getElementById('admin-overlay').addEventListener('click', e => {
            if (e.target === e.currentTarget) closeAdmin();
        });
        document.getElementById('login-overlay').addEventListener('click', e => {
            if (e.target === e.currentTarget) closeLogin();
        });
        document.getElementById('cmodal').addEventListener('click', e => {
            if (e.target === e.currentTarget) closeModal();
        });

        initApp();
    </script>
</body>

</html>
